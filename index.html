<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Calculadora Estudiantil</title>
</head>

<body>

<h1>Calculadora Estudiantil</h1>

<h2>Promedio</h2>

<input type="number" id="nota1" placeholder="Nota 1">
<input type="number" id="nota2" placeholder="Nota 2">
<input type="number" id="nota3" placeholder="Nota 3">

<br><br>

<button onclick="calcularPromedio()">Calcular promedio</button>

<p id="resultado"></p>

<script>
function calcularPromedio() {
  let n1 = Number(document.getElementById("nota1").value);
  let n2 = Number(document.getElementById("nota2").value);
  let n3 = Number(document.getElementById("nota3").value);

  let promedio = (n1 + n2 + n3) / 3;

  document.getElementById("resultado").innerText =
    "Tu promedio es: " + promedio.toFixed(2);
}
</script>

</body>
</html>
