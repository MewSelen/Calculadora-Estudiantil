<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Calculadora Estudiantil</title>

  <style>
    body {
      font-family: Arial;
      background: #f4f6f8;
      text-align: center;
      padding: 40px;
    }

    .container {
      background: white;
      padding: 20px;
      border-radius: 15px;
      max-width: 400px;
      margin: auto;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    input {
      padding: 10px;
      margin: 5px;
      width: 80%;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      background: #4CAF50;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #45a049;
    }
  h3 {
  margin-top: 30px;
}

.section {
  margin-top: 20px;
  padding: 15px;
  border-top: 1px solid #eee;
}
  </style>
</head>

<body>

<div class="container">
  <h1>Calculadora Estudiantil</h1>

 <div class="section">
  <h3>Promedio</h3>

  <input type="number" id="nota1" placeholder="Nota 1">
  <input type="number" id="nota2" placeholder="Nota 2">
  <input type="number" id="nota3" placeholder="Nota 3">

  <br><br>

  <button onclick="calcularPromedio()">Calcular</button>

  <p id="resultado"></p>
   </div>
  <div class="section">
<h3>¿Cuánto necesito para aprobar?</h3>

<input type="number" id="notaActual" placeholder="Nota actual">
<input type="number" id="notaMinima" placeholder="Nota para aprobar">
<input type="number" id="pesoFinal" placeholder="Peso del final (%)">

<br><br>

<button onclick="calcularNecesaria()">Calcular</button>

<p id="resultado2"></p>
    </div>
</div>

<script>
function calcularPromedio() {
  let n1 = Number(document.getElementById("nota1").value);
  let n2 = Number(document.getElementById("nota2").value);
  let n3 = Number(document.getElementById("nota3").value);

  let promedio = (n1 + n2 + n3) / 3;

  document.getElementById("resultado").innerText =
    "Tu promedio es: " + promedio.toFixed(2);
}
function calcularNecesaria() {
  let actual = Number(document.getElementById("notaActual").value);
  let minima = Number(document.getElementById("notaMinima").value);
  let peso = Number(document.getElementById("pesoFinal").value) / 100;

  let necesaria = (minima - (actual * (1 - peso))) / peso;

  document.getElementById("resultado2").innerText =
    "Necesitás sacar: " + necesaria.toFixed(2);
}
</script>

</body>
</html>
